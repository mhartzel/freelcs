    <style>
        :root {
		--bg-color: #e0e0e0;
		--card-bg: #f4f4f4;
		--ibm-blue: #006699;
		--switch-red: #d32f2f;
		--switch-actuator: #ffffff;
		--switch-slot: #111;
		--text-color: #333;
		--gold: #d4af37;
        }

        body {
		font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		background-color: var(--bg-color);
		color: var(--text-color);
		display: flex;
		justify-content: center;
		padding: 20px;
		margin: 0;
        }

        .container {
		background-color: var(--card-bg);
		border: 1px solid #ccc;
		border-radius: 8px;
		box-shadow: 0 4px 8px rgba(0,0,0,0.1);
		/* width: 90%; */
		/* max-width: 90%; */
		padding: 25px;
        }

        header {
		text-align: center;
		border-bottom: 2px solid #ddd;
		margin-bottom: 25px;
		padding-bottom: 15px;
        }

        h1 {
		margin: 0 0 5px 0;
		font-size: 1.8rem;
		color: var(--ibm-blue);
	}
        .subtitle {
		color: #555;
		font-size: 0.9rem;
	}

        /* --- MAIN LAYOUT --- */
        .main-interface {
		display: grid;
		grid-template-columns: auto auto auto auto;
        }

        .drop-box {
		background: white;
		padding: 20px;
		border: 1px solid #ddd;
		border-radius: 6px;
		margin-bottom: 8px;
		margin-right: 8px;
		align-self: stretch;
        }
        .drop-box-group label {
		display: block;
		font-weight: 700;
		margin-bottom: 8px;
		color: var(--ibm-blue);
        }
        .drop-box-group select {
		/* width: 100%; */
		padding: 10px;
		font-size: 1rem;
		border: 1px solid #ccc;
		border-radius: 4px;
		height: fit-content;
		width: fit-content;
        }
        .hint {
		font-size: 0.8rem;
		color: #777;
		margin-top: 5px;
		font-style: italic;
	}

        .file-load-save {
		background: white;
		padding: 20px;
		border: 1px solid #ddd;
		border-radius: 6px;
		height: fit-content;
		width: auto;
		margin-bottom: 8px;
		margin-right: 8px;
        }
        .radio-buttons {
		font-size: 0.8rem;
        }

    </style>
</head>

		</form>

	function populateProcessors() {
		const selection = document.getElementById('NumProcessors');
		/* processors.forEach((item, index) => { */
		processors.forEach((item, index) => {
			const option = document.createElement('option');
			/* option.value = index ; */
			option.value = index ;
			/* option.innerText = item.name; */
			option.innerText = item;
			selection.appendChild(option);
		});
	}

	function init() {
		populateProcessors();
		document.getElementById('NumProcessors').value = "0";
		applyPreset();
		document.getElementById("HotfolderPath").value = default_settings.hotfolder_path;

	  const originalData = {

	      }
	    ]
	  };

	  const a = document.createElement("a");
	  a.href = URL.createObjectURL(new Blob([JSON.stringify(originalData, null, 2)], {
	    type: "text/plain"
	  }));
	  a.setAttribute("download", "data.txt");
	  document.body.appendChild(a);

services:
  loudness_correction: 
    build:
      context: .
      dockerfile: Dockerfile.loudness_correction
    networks:
      - local_network
    volumes:
      - ./mountpoint:/mountpoint:rw
  progress_report: 
    build:
      context: .
      dockerfile: Dockerfile.progress_report
    networks:
      - local_network
    ports:
      - 9000:9000
  heartbeat_checker: 
    build:
      context: .
      dockerfile: Dockerfile.heartbeat_checker
    networks:
      - local_network
networks:
  local_network:

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Username Tooltip Example</title>
    <style>
        /* Reset and Base Styles */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        .form-container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        /* Label and Input Layout */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label-wrapper {
            display: flex;
            align-items: center;
            font-weight: bold;
            color: #333;
            cursor: default;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        /* Tooltip Container and Icon */
        .tooltip-container {
            position: relative;
            display: inline-block;
            margin-left: 5px;
        }

        .help-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background-color: #007bff;
            color: white;
            border-radius: 50%;
            font-size: 12px;
            cursor: help;
            user-select: none;
        }

        /* Tooltip Text Styling */
        .tooltip-text {
            /* Positioning */
            position: absolute;
            bottom: 125%; /* Position above the icon */
            left: 50%;
            transform: translateX(-50%);
            
            /* Visuals */
            background-color: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            white-space: nowrap;
            font-size: 14px;
            font-weight: normal;
            
            /* Visibility (Hidden by default) */
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 10;
        }

        /* Tooltip Arrow (Small triangle at bottom) */
        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="input-group">
            <!-- The Label with the Question Mark -->
            <label class="label-wrapper" for="username">
                Username
                <span class="tooltip-container">
                    <span class="help-icon" id="helpIcon">?</span>
                    <span class="tooltip-text" id="tooltipText">Hello world</span>
                </span>
            </label>

            <!-- The Text Input Field -->
            <input type="text" id="username" name="username" placeholder="Enter username">
        </div>
    </div>

    <script>
        /**
         * This function initializes the tooltip event listeners.
         * We use traditional function declarations as requested.
         */
            const icon = document.getElementById('helpIcon');
            const tooltip = document.getElementById('tooltipText');

            /**
             * Displays the tooltip by changing opacity and visibility.
             */
            function showTooltip() {
                tooltip.style.visibility = 'visible';
                tooltip.style.opacity = '1';
            }

            /**
             * Hides the tooltip by changing opacity and visibility.
             */
            function hideTooltip() {
                tooltip.style.visibility = 'hidden';
                tooltip.style.opacity = '0';
            }

            // Attach event listeners using named functions
            icon.addEventListener('mouseenter', showTooltip);
            icon.addEventListener('mouseleave', hideTooltip);

    </script>

</body>
</html>
